name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality:
    name: Lint, test and build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: caca
          POSTGRES_PASSWORD: caca
          POSTGRES_DB: caca_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U caca -d caca_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: "postgresql://caca:caca@localhost:5432/caca_ci?schema=public"
      TEST_DATABASE_URL: "postgresql://caca:caca@localhost:5432/caca_ci?schema=public"
      JWT_SECRET: "ci-secret-with-more-than-thirty-two-characters"
      JWT_EXPIRES_IN: "7d"
      FRONTEND_ORIGIN: "http://localhost:3000"
      BCRYPT_SALT_ROUNDS: "10"
      RATE_LIMIT_MAX: "120"
      RATE_LIMIT_WINDOW: "1 minute"
      AUTH_REGISTER_RATE_LIMIT_MAX: "8"
      AUTH_LOGIN_RATE_LIMIT_MAX: "12"
      PUBLIC_FORM_RATE_LIMIT_MAX: "10"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run db:generate

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test

      - name: Build application
        run: npm run build
