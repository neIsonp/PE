services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: caca
      POSTGRES_PASSWORD: caca
      POSTGRES_DB: caca
    ports:
      - "5433:5432"
    volumes:
      - caca_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U caca -d caca"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3333
      DATABASE_URL: postgresql://caca:caca@postgres:5432/caca?schema=public
      JWT_SECRET: docker-local-secret-with-more-than-thirty-two-characters
      JWT_EXPIRES_IN: "7d"
      FRONTEND_ORIGIN: http://localhost:3000,http://127.0.0.1:3000
      BCRYPT_SALT_ROUNDS: 12
      RATE_LIMIT_MAX: 120
      RATE_LIMIT_WINDOW: "1 minute"
      AUTH_REGISTER_RATE_LIMIT_MAX: 8
      AUTH_LOGIN_RATE_LIMIT_MAX: 12
      PUBLIC_FORM_RATE_LIMIT_MAX: 10
    ports:
      - "3333:3333"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3333/ready').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:3333/api
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:3333/api
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  caca_postgres_data:
